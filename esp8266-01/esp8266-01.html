<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MicroDZ | Sensor Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --dark-bg: #0a0b10;
            --panel-bg: rgba(16, 18, 27, 0.8);
            --border-color: rgba(0, 243, 255, 0.3);
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 243, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .microdz-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .microdz-card::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 20px;
            width: 40px;
            height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .label-tech {
            font-size: 0.7rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .value-display {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .status-bar {
            font-size: 0.65rem;
            letter-spacing: 2px;
            border-top: 1px solid rgba(0, 243, 255, 0.1);
        }

        /* Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 50;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .glow-text-green { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .glow-text-blue { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .btn-back {
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .btn-back:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #auth-guard {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4">

<!-- AUTH GUARD OVERLAY -->
<div id="auth-guard">
    <div class="text-center">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p id="guard-text" class="text-xs text-cyan-500 tracking-[0.3em] font-bold uppercase animate-pulse">Verifying_Identity...</p>
    </div>
</div>

<!-- CIRCUIT DECORATION -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 overflow-hidden z-0">
    <svg width="100%" height="100%">
        <path d="M0 100 L100 100 L150 150 L300 150" stroke="#00f3ff" fill="none" stroke-width="1"/>
        <path d="M100% 200 Lcalc(100% - 100px) 200 Lcalc(100% - 150px) 250" stroke="#00f3ff" fill="none" stroke-width="1"/>
        <circle cx="300" cy="150" r="3" fill="#00f3ff"/>
        <circle cx="0" cy="100" r="3" fill="#00f3ff"/>
    </svg>
</div>

<header class="relative z-10 text-center mb-8">
    <h1 class="text-4xl font-bold text-white mb-2">MICRODZ</h1>
    <p class="text-[10px] text-cyan-500 tracking-[0.3em] font-bold uppercase">Telemetry_Control_v2.5</p>
</header>

<main class="w-full max-w-[400px] relative z-10">

    <div class="microdz-card p-6">
        <h2 class="text-xs font-bold mb-6 text-cyan-400 border-b border-cyan-900 pb-2 flex justify-between items-center">
            <span>> NODE_ESP8266_DHT22</span>
            <span id="conn-indicator" class="animate-pulse">● CONNECTING</span>
        </h2>

        <!-- TEMPERATURE DISPLAY -->
        <div class="mb-8 relative">
            <label class="label-tech">Ambient_Temperature</label>
            <div class="flex items-baseline">
                <span id="temp" class="value-display text-5xl font-bold glow-text-blue">--</span>
                <span class="text-xl ml-2 text-cyan-700 font-bold">°C</span>
            </div>
            <div class="w-full bg-cyan-900/30 h-1 mt-2">
                <div id="temp-bar" class="bg-cyan-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- HUMIDITY DISPLAY -->
        <div class="mb-8">
            <label class="label-tech">Air_Humidity</label>
            <div class="flex items-baseline">
                <span id="hum" class="value-display text-5xl font-bold glow-text-green">--</span>
                <span class="text-xl ml-2 text-green-900 font-bold">%</span>
            </div>
            <div class="w-full bg-green-900/30 h-1 mt-2">
                <div id="hum-bar" class="bg-green-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- SYSTEM STATUS -->
        <div class="status-bar pt-4 text-[9px] text-gray-500 uppercase flex flex-col gap-1 mb-6">
            <div class="flex justify-between">
                <span>Signal_Protocol:</span>
                <span class="text-cyan-400">MQTT/WSS</span>
            </div>
            <div class="flex justify-between">
                <span>Broker_Link:</span>
                <span id="status-text" class="text-yellow-500">Initializing...</span>
            </div>
            <div class="flex justify-between">
                <span>Last_Sync:</span>
                <span id="last-sync" class="text-gray-400">Never</span>
            </div>
        </div>

        <!-- BACK BUTTON -->
        <button id="backBtn" class="btn-back w-full py-3 rounded flex items-center justify-center gap-2">
            <span>« RETURN_TO_TERMINAL</span>
        </button>
    </div>

</main>

<footer class="mt-12 text-center relative z-10">
    <div class="text-[9px] text-gray-600 mb-1">DATA_SOURCE: SENSOR/ESP8266_01/DHT22</div>
    <p class="text-[10px] text-cyan-900 font-bold uppercase tracking-[0.2em]">© 2025 MicroDZ Digital Systems</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    /* ================= FIREBASE CONFIG ================= */
    const firebaseConfig = {
        apiKey: "AIzaSyBUH3svPecRr-75zmHA3kYJ-ypDeuZzey0",
        authDomain: "microdz-login.firebaseapp.com",
        projectId: "microdz-login",
        appId: "1:407509494952:web:c1e8d31bf39ec05847669d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    /* ================= AUTH GUARD ================= */
    const authGuard = document.getElementById("auth-guard");
    const guardText = document.getElementById("guard-text");
    
    // URL untuk Redirect jika Gagal Login
    const LOGIN_PAGE_URL = "https://brotherchiss.github.io/MicroDZ/index.html";
    // URL untuk Tombol Kembali (Dashboard User)
    const USER_DASHBOARD_URL = "https://brotherchiss.github.io/MicroDZ/user-dashboard.html";

    // Timeout safety: Jika dalam 8 detik tidak ada respon dari Firebase, paksa redirect ke Login
    const authTimeout = setTimeout(() => {
        guardText.innerText = "TIMEOUT: REDIRECTING...";
        window.location.href = LOGIN_PAGE_URL;
    }, 8000);

    onAuthStateChanged(auth, (user) => {
        clearTimeout(authTimeout); // Batalkan timeout jika ada respon
        
        if (!user) {
            guardText.innerText = "ACCESS_DENIED";
            window.location.href = LOGIN_PAGE_URL;
        } else {
            // Animasi transisi halus saat masuk
            authGuard.style.opacity = "0";
            setTimeout(() => {
                authGuard.style.display = "none";
            }, 500);
            initMQTT();
        }
    });

    /* ================= NAVIGATION ================= */
    document.getElementById("backBtn").onclick = () => {
        // Kembali ke dashboard user tanpa logout
        window.location.href = USER_DASHBOARD_URL;
    };

    /* ================= MQTT LOGIC ================= */
    function initMQTT() {
        const brokerUrl = "wss://broker.hivemq.com:8884/mqtt";
        const topicData = "sensor/esp8266_01/dht22";

        const options = {
            clientId: "microdz_dash_" + Math.random().toString(16).substr(2, 8),
            clean: true,
            connectTimeout: 5000
        };

        const statusText = document.getElementById("status-text");
        const indicator  = document.getElementById("conn-indicator");
        const tempEl     = document.getElementById("temp");
        const humEl      = document.getElementById("hum");
        const tempBar    = document.getElementById("temp-bar");
        const humBar     = document.getElementById("hum-bar");
        const lastSyncEl = document.getElementById("last-sync");

        const client = mqtt.connect(brokerUrl, options);

        client.on("connect", () => {
            statusText.innerText = "CONNECTED";
            statusText.className = "text-green-500";
            indicator.innerText = "● ONLINE";
            indicator.className = "text-green-500 animate-pulse";
            client.subscribe(topicData);
        });

        client.on("message", (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                                now.getMinutes().toString().padStart(2, '0') + ":" + 
                                now.getSeconds().toString().padStart(2, '0');

                if (data.temperature !== undefined) {
                    const t = data.temperature.toFixed(1);
                    tempEl.innerText = t;
                    const percent = Math.min(Math.max((t / 50) * 100, 0), 100);
                    tempBar.style.width = percent + "%";
                }

                if (data.humidity !== undefined) {
                    const h = data.humidity.toFixed(1);
                    humEl.innerText = h;
                    humBar.style.width = h + "%";
                }

                lastSyncEl.innerText = timeStr;
            } catch (e) {
                console.error("Payload_Error", e);
            }
        });

        client.on("offline", () => {
            statusText.innerText = "OFFLINE";
            statusText.className = "text-red-500";
            indicator.innerText = "● DISCONNECTED";
            indicator.className = "text-red-500";
        });
    }
</script>

</body>
</html>
