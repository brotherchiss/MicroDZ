<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>DHT22 Dashboard</title>
</head>
<body>
  <h2>Monitoring DHT22</h2>
  <pre id="out">Loading...</pre>

  <script>
    fetch("https://influx-proxy.NAMA-AKUN.workers.dev")
      .then(res => res.text())
      .then(data => {
        document.getElementById("out").textContent = data;
      })
      .catch(err => {
        document.getElementById("out").textContent = "Gagal ambil data";
      });
  </script>
</body>
</html>
