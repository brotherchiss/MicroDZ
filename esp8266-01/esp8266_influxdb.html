<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHT22 History</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  canvas { max-width: 100%; height: 400px; }
</style>
</head>
<body>
<h2>DHT22 Sensor History (6 jam)</h2>
<canvas id="chart"></canvas>

<script>
const influxQueryURL = "https://us-east-1-1.aws.cloud2.influxdata.com/api/v2/query?org=MicroDZ";
const token = "jaM7a03Hgl-X7IsyINBjGrh-FBG2s2tVwUB0QEqurIOeVQiwqW_TNBElQVPNwvx_StJDyXLNwiPnDvm6EdYQeg==";

async function fetchData() {
  const body = JSON.stringify({
    query: `
      from(bucket:"ESP8266-01")
        |> range(start: -6h)
        |> filter(fn: (r) => r._measurement=="dht22")
    `
  });

  const res = await fetch(influxQueryURL, {
    method: "POST",
    headers: {
      "Authorization": "Token " + token,
      "Content-Type": "application/json"
    },
    body: body
  });

  const data = await res.json();
  return data;
}

function parseData(data) {
  const labels = [];
  const temperature = [];
  const humidity = [];

  if (data && data.results && data.results[0].tables) {
    data.results[0].tables.forEach(table => {
      table.records.forEach(r => {
        const time = new Date(r._time).toLocaleTimeString();
        labels.push(time);
        if (r._field === "temperature") {
          temperature.push(r._value);
          humidity.push(null);  // placeholder supaya index sama
        } else if (r._field === "humidity") {
          humidity.push(r._value);
          temperature.push(null); // placeholder supaya index sama
        }
      });
    });
  }

  return { labels, temperature, humidity };
}

async function drawChart() {
  const rawData = await fetchData();
  const { labels, temperature, humidity } = parseData(rawData);

  const ctx = document.getElementById('chart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Temperature (°C)', data: temperature, borderColor: 'red', fill: false },
        { label: 'Humidity (%)', data: humidity, borderColor: 'blue', fill: false }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: { display: true, title: { display: true, text: 'Time' } },
        y: { display: true, title: { display: true, text: 'Value' } }
      }
    }
  });
}

// Run chart
drawChart();
</script>
</body>
</html>
