<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP8266 DHT22 Monitor dengan Waktu</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; background: #f6f8fa; }
h1 { text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background-color: #eee; }
</style>
</head>
<body>

<h1>ESP8266 DHT22 Monitor</h1>

<table>
<thead>
<tr>
<th>Waktu</th>
<th>Suhu (°C)</th>
<th>Kelembaban (%)</th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
</table>

<script>
// MQTT setup
const broker = "wss://broker.hivemq.com:8884/mqtt";
const topic = "sensor/esp8266_01/dht22";
const client = mqtt.connect(broker, { clean:true, connectTimeout:4000, reconnectPeriod:1000 });

// Simpan 10 data terakhir
let history = [];

function formatTime(date){
  return date.toTimeString().split(' ')[0]; // HH:MM:SS
}

client.on('connect', () => {
  console.log("MQTT connected");
  client.subscribe(topic, (err)=>{
    if(!err) console.log("Subscribed to topic:", topic);
  });
});

client.on('message', (t, message)=>{
  if(t !== topic) return;
  try{
    const dataArr = JSON.parse(message.toString()); // array JSON dari NodeMCU
    const now = new Date();
    
    // update history, ambil maksimal 10 data terakhir
    dataArr.forEach(d => {
      history.push({
        time: formatTime(now), // waktu browser saat data diterima
        temperature: d.temperature,
        humidity: d.humidity
      });
    });

    if(history.length > 10) history = history.slice(-10); // simpan 10 data terakhir

    // update tabel
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = "";
    history.forEach(d=>{
      tbody.innerHTML += `<tr>
        <td>${d.time}</td>
        <td>${d.temperature.toFixed(1)}</td>
        <td>${d.humidity.toFixed(1)}</td>
      </tr>`;
    });

  } catch(e){
    console.error("Error parsing JSON:", e);
  }
});
</script>

</body>
</html>
