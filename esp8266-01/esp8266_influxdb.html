<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor DHT22 Minimalis</title>
    <!-- MQTT Library -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #333;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }

        .led.online {
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
        }

        .sensor-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .sensor-item {
            flex: 1;
            background: #fafafa;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .sensor-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .sensor-value {
            font-size: 2.2rem;
            font-weight: 600;
            color: #333;
            line-height: 1.2;
        }

        .sensor-unit {
            font-size: 0.9rem;
            color: #999;
            margin-left: 2px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .history-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            color: #999;
            font-size: 0.85rem;
        }

        .history-temp {
            font-weight: 500;
            color: #ff6b6b;
        }

        .history-hum {
            font-weight: 500;
            color: #4d9eff;
        }

        .debug {
            font-size: 0.8rem;
            color: #999;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed #ddd;
            word-break: break-word;
        }

        .reconnect-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .reconnect-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🌡️ DHT22 Monitor</h1>
                <div class="status" id="status">
                    <span class="led" id="statusLed"></span>
                    <span id="statusText">Menghubungkan...</span>
                </div>
            </div>

            <div class="sensor-row">
                <div class="sensor-item">
                    <div class="sensor-label">Suhu</div>
                    <div>
                        <span class="sensor-value" id="tempValue">--</span>
                        <span class="sensor-unit">°C</span>
                    </div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">Kelembaban</div>
                    <div>
                        <span class="sensor-value" id="humValue">--</span>
                        <span class="sensor-unit">%</span>
                    </div>
                </div>
            </div>

            <div class="info-row">
                <span>Data tersimpan: <span id="dataCount">0</span></span>
                <span>Update: <span id="lastUpdate">--:--:--</span></span>
            </div>

            <button class="reconnect-btn" id="reconnectBtn">🔄 Sambungkan Ulang</button>
        </div>

        <div class="card">
            <div class="history-title">📋 Riwayat 10 Data Terakhir</div>
            <div id="historyContainer">
                <div style="text-align: center; color: #999; padding: 20px;">Menunggu data...</div>
            </div>
        </div>

        <div class="card debug" id="debug">
            <div><strong>Debug:</strong> <span id="debugMsg">Inisialisasi...</span></div>
        </div>
    </div>

    <script>
        // Konfigurasi
        const MQTT_CONFIG = {
            host: 'broker.hivemq.com',
            port: 8000,           // WebSocket port
            topic: 'sensor/esp8266_01/dht22'
        };

        // State
        let mqttClient = null;
        let reconnectTimer = null;
        let historyData = [];
        let lastDataTime = null;

        // Elemen DOM
        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const tempValue = document.getElementById('tempValue');
        const humValue = document.getElementById('humValue');
        const dataCount = document.getElementById('dataCount');
        const lastUpdate = document.getElementById('lastUpdate');
        const historyContainer = document.getElementById('historyContainer');
        const debugMsg = document.getElementById('debugMsg');
        const reconnectBtn = document.getElementById('reconnectBtn');

        // Helper debug
        function setDebug(msg) {
            console.log('[Debug]', msg);
            debugMsg.textContent = msg;
        }

        // Update status koneksi
        function setConnectionStatus(connected) {
            if (connected) {
                statusLed.className = 'led online';
                statusText.textContent = 'Terhubung';
                statusText.style.color = '#4caf50';
            } else {
                statusLed.className = 'led';
                statusText.textContent = 'Terputus';
                statusText.style.color = '#ff4444';
            }
        }

        // Update tampilan data terbaru
        function updateDisplay(data) {
            if (!data || data.length === 0) return;

            // Data terbaru adalah elemen terakhir array
            const latest = data[data.length - 1];
            
            tempValue.textContent = latest.temperature.toFixed(1);
            humValue.textContent = latest.humidity.toFixed(1);
            dataCount.textContent = data.length;

            const now = new Date();
            lastUpdate.textContent = now.toLocaleTimeString('id-ID');
            
            // Update riwayat
            renderHistory(data);
        }

        // Render tabel riwayat
        function renderHistory(data) {
            if (data.length === 0) {
                historyContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Belum ada data</div>';
                return;
            }

            let html = '';
            // Tampilkan dari terbaru ke terlama (reverse order)
            data.slice().reverse().forEach((item, index) => {
                const time = new Date().toLocaleTimeString('id-ID'); // Sementara pakai waktu sekarang
                html += `
                    <div class="history-item">
                        <span class="history-time">${index+1}. ${time}</span>
                        <span>
                            <span class="history-temp">${item.temperature.toFixed(1)}°C</span> |
                            <span class="history-hum">${item.humidity.toFixed(1)}%</span>
                        </span>
                    </div>
                `;
            });
            historyContainer.innerHTML = html;
        }

        // Inisialisasi koneksi MQTT
        function connectMQTT() {
            setDebug('Menghubungkan ke MQTT...');
            setConnectionStatus(false);

            if (mqttClient) {
                try {
                    mqttClient.end(true);
                } catch (e) {}
                mqttClient = null;
            }

            const clientId = 'web_dht_' + Math.random().toString(16).substring(2, 10);
            
            mqttClient = mqtt.connect(`ws://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}/mqtt`, {
                clientId: clientId,
                clean: true,
                connectTimeout: 5000,
                reconnectPeriod: 5000,  // Auto reconnect setiap 5 detik
                keepalive: 30
            });

            mqttClient.on('connect', () => {
                setDebug('Terhubung ke broker');
                setConnectionStatus(true);

                mqttClient.subscribe(MQTT_CONFIG.topic, { qos: 0 }, (err) => {
                    if (err) {
                        setDebug('Gagal subscribe: ' + err);
                    } else {
                        setDebug('Subscribe OK, menunggu data...');
                    }
                });
            });

            mqttClient.on('message', (topic, message) => {
                try {
                    const payload = message.toString();
                    setDebug('Data diterima: ' + payload.substring(0, 50) + (payload.length > 50 ? '...' : ''));
                    
                    const data = JSON.parse(payload);
                    if (Array.isArray(data)) {
                        historyData = data;
                        updateDisplay(data);
                        lastDataTime = Date.now();
                    } else {
                        setDebug('Format data tidak sesuai (bukan array)');
                    }
                } catch (e) {
                    setDebug('Error parsing: ' + e.message);
                }
            });

            mqttClient.on('error', (err) => {
                setDebug('Error: ' + err.message);
                setConnectionStatus(false);
            });

            mqttClient.on('close', () => {
                setDebug('Koneksi ditutup');
                setConnectionStatus(false);
            });

            mqttClient.on('offline', () => {
                setDebug('Offline');
                setConnectionStatus(false);
            });

            mqttClient.on('reconnect', () => {
                setDebug('Mencoba reconnect...');
                setConnectionStatus(false);
            });
        }

        // Manual reconnect
        function manualReconnect() {
            setDebug('Reconnect manual...');
            connectMQTT();
        }

        // Cek apakah data sudah lama tidak update
        function checkStaleData() {
            if (!lastDataTime) return;
            const staleThreshold = 15000; // 15 detik
            if (Date.now() - lastDataTime > staleThreshold) {
                // Data tidak update, mungkin koneksi bermasalah
                if (mqttClient && !mqttClient.connected) {
                    setDebug('Data tidak update, mencoba reconnect...');
                    connectMQTT();
                }
            }
        }

        // Inisialisasi
        window.addEventListener('load', () => {
            connectMQTT();
            reconnectBtn.addEventListener('click', manualReconnect);
            
            // Cek stale data setiap 10 detik
            setInterval(checkStaleData, 10000);
            
            // Simulasi data jika tidak ada koneksi (untuk testing, hapus jika sudah real)
            // setTimeout(() => {
            //     if (historyData.length === 0) {
            //         const mock = [];
            //         for (let i=0; i<10; i++) {
            //             mock.push({
            //                 temperature: 25 + Math.random()*5,
            //                 humidity: 60 + Math.random()*20
            //             });
            //         }
            //         historyData = mock;
            //         updateDisplay(mock);
            //         setDebug('Mode simulasi (tidak ada koneksi MQTT)');
            //     }
            // }, 3000);
        });
    </script>
</body>
</html>
