<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP8266 DHT22 History</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; background: #f6f8fa; }
h1 { text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background-color: #eee; }
</style>
</head>
<body>

<h1>History 10 Data Terakhir DHT22</h1>

<table>
<thead>
<tr>
<th>No</th>
<th>Suhu (°C)</th>
<th>Kelembaban (%)</th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
</table>

<script>
const broker = "wss://broker.hivemq.com:8884/mqtt";
const topic = "sensor/esp8266_01/dht22";

const client = mqtt.connect(broker, {
  clean: true,
  connectTimeout: 4000,
  reconnectPeriod: 1000
});

let history = [];

client.on('connect', () => {
  console.log("MQTT connected");
  client.subscribe(topic, (err) => {
    if(!err) console.log("Subscribed to topic:", topic);
  });
});

client.on('message', (t, message) => {
  if(t !== topic) return;
  try {
    history = JSON.parse(message.toString()); // array JSON 10 data terakhir

    // Tampilkan di tabel
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = "";
    history.forEach((d,i)=>{
      tbody.innerHTML += `<tr>
        <td>${i+1}</td>
        <td>${d.temperature.toFixed(1)}</td>
        <td>${d.humidity.toFixed(1)}</td>
      </tr>`;
    });

  } catch(e){
    console.error("Error parsing JSON:", e);
  }
});
</script>

</body>
</html>
