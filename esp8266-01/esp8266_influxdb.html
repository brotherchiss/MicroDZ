<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQTT Connection Status</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; background: #f6f8fa; }
h1 { text-align: center; }
#status { padding: 10px; border: 1px solid #ccc; background: #fff; text-align: center; font-weight: bold; }
.connected { color: green; }
.disconnected { color: red; }
</style>
</head>
<body>

<h1>Status MQTT Broker</h1>
<div id="status" class="disconnected">Disconnected</div>

<script>
const broker = "wss://broker.hivemq.com:8884/mqtt";
const client = mqtt.connect(broker, {
  clean: true,
  connectTimeout: 4000,
  reconnectPeriod: 1000
});

const statusDiv = document.getElementById('status');

client.on('connect', () => {
  statusDiv.textContent = "Connected to MQTT Broker";
  statusDiv.className = "connected";
});

client.on('reconnect', () => {
  statusDiv.textContent = "Reconnecting...";
  statusDiv.className = "disconnected";
});

client.on('offline', () => {
  statusDiv.textContent = "Offline / Disconnected";
  statusDiv.className = "disconnected";
});

client.on('error', (err) => {
  statusDiv.textContent = "Error: " + err.message;
  statusDiv.className = "disconnected";
});
</script>

</body>
</html>
