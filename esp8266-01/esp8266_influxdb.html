<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DHT22 History via Worker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>body{font-family:Arial,sans-serif;margin:20px}canvas{max-width:100%;height:400px}</style>
</head>
<body>
<h2>DHT22 History (6 jam) via Worker</h2>
<canvas id="chart"></canvas>

<script>
const workerURL = "https://esp8266-01.wahyu-ikhsannudin.workers.dev"; // ganti sesuai URL Worker

async function fetchHistory() {
  const res = await fetch(workerURL);
  const data = await res.json();

  const labels = [];
  const temperature = [];
  const humidity = [];

  if(data.results && data.results[0].tables) {
    data.results[0].tables.forEach(table=>{
      table.records.forEach(r=>{
        const time = new Date(r._time).toLocaleTimeString();
        labels.push(time);
        if(r._field === "temperature") temperature.push(r._value);
        if(r._field === "humidity") humidity.push(r._value);
      });
    });
  }

  return { labels, temperature, humidity };
}

async function drawChart() {
  const { labels, temperature, humidity } = await fetchHistory();

  const ctx = document.getElementById('chart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Temperature (°C)', data: temperature, borderColor: 'red', fill:false },
        { label: 'Humidity (%)', data: humidity, borderColor: 'blue', fill:false }
      ]
    },
    options: { responsive:true }
  });
}

drawChart();
</script>
</body>
</html>
