<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP8266 DHT22 Monitor</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; background: #f6f8fa; }
h1 { text-align: center; }
#status { padding: 10px; border: 1px solid #ccc; background: #fff; text-align: center; font-weight: bold; margin-bottom: 20px; }
.connected { color: green; }
.disconnected { color: red; }
#data { padding: 10px; border: 1px solid #ccc; background: #fff; text-align: center; }
#data p { font-size: 1.2em; margin: 5px 0; }
</style>
</head>
<body>

<h1>ESP8266 DHT22 Monitor</h1>

<div id="status" class="disconnected">Disconnected</div>

<div id="data">
<p>Suhu: <span id="temp">-</span> °C</p>
<p>Kelembaban: <span id="hum">-</span> %</p>
</div>

<script>
const broker = "wss://broker.hivemq.com:8884/mqtt"; // HiveMQ WebSocket
const topic = "sensor/esp8266_01/dht22";

const client = mqtt.connect(broker, {
  clean: true,
  connectTimeout: 4000,
  reconnectPeriod: 1000
});

const statusDiv = document.getElementById('status');
const tempSpan = document.getElementById('temp');
const humSpan = document.getElementById('hum');

// MQTT Events
client.on('connect', () => {
  statusDiv.textContent = "Connected to MQTT Broker";
  statusDiv.className = "connected";
  client.subscribe(topic);
});

client.on('reconnect', () => {
  statusDiv.textContent = "Reconnecting...";
  statusDiv.className = "disconnected";
});

client.on('offline', () => {
  statusDiv.textContent = "Offline / Disconnected";
  statusDiv.className = "disconnected";
});

client.on('error', (err) => {
  statusDiv.textContent = "Error: " + err.message;
  statusDiv.className = "disconnected";
});

client.on('message', (t, message) => {
  if(t !== topic) return;
  try {
    const data = JSON.parse(message.toString()); // NodeMCU publish JSON
    if(data.temperature !== undefined && data.humidity !== undefined){
      tempSpan.textContent = data.temperature.toFixed(1);
      humSpan.textContent = data.humidity.toFixed(1);
    }
  } catch(e){
    console.error("Error parsing JSON:", e);
  }
});
</script>

</body>
</html>
