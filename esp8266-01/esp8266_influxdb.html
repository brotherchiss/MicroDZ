<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP8266 DHT22 Monitor</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f6f8fa; }
    h1 { text-align: center; }
    #latest { margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; text-align: center; border: 1px solid #ccc; }
    th { background-color: #eee; }
  </style>
</head>
<body>

<h1>Monitor ESP8266 DHT22</h1>

<div id="latest">
  <h2>Data Terbaru</h2>
  <p>Suhu: <span id="temp">-</span> °C</p>
  <p>Kelembaban: <span id="hum">-</span> %</p>
</div>

<div id="history">
  <h2>History 10 Data Terakhir</h2>
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Suhu (°C)</th>
        <th>Kelembaban (%)</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <!-- Data akan diisi JS -->
    </tbody>
  </table>
</div>

<script>
  // ===== Konfigurasi MQTT =====
  const broker = "wss://broker.hivemq.com:8884/mqtt"; // WebSocket HiveMQ
  const topic = "sensor/esp8266_01/dht22";

  const client = mqtt.connect(broker);

  let history = [];

  client.on('connect', () => {
    console.log("MQTT connected");
    client.subscribe(topic, (err) => {
      if (!err) console.log("Subscribed to topic:", topic);
    });
  });

  client.on('message', (t, message) => {
    if(t === topic){
      try {
        const data = JSON.parse(message.toString());
        // Update latest
        document.getElementById('temp').textContent = data.temperature.toFixed(1);
        document.getElementById('hum').textContent = data.humidity.toFixed(1);

        // Simpan history (max 10)
        history.push(data);
        if(history.length > 10) history.shift();

        // Tampilkan history
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = "";
        history.forEach((d, i) => {
          const row = `<tr>
                        <td>${i+1}</td>
                        <td>${d.temperature.toFixed(1)}</td>
                        <td>${d.humidity.toFixed(1)}</td>
                      </tr>`;
          tbody.innerHTML += row;
        });
      } catch(e) {
        console.error("Error parsing data:", e);
      }
    }
  });
</script>

</body>
</html>
